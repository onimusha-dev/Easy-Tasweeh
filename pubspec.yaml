name: easy_tasbeeh
description: A simple and elegant dhikr counter app for Muslims to track tasbeeh, zikr, and daily remembrance. Stay consistent with your spiritual routine using a clean, distraction-free digital tasbeeh counter.
publish_to: 'none'

