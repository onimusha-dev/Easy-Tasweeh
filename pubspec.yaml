  path_provider: ^2.1.5
  intl: ^0.20.2
  shared_preferences: ^2.5.4
#  dynamic_color: ^1.8.1
  app_settings: ^7.0.0
  url_launcher: ^6.3.2
  fl_chart: ^1.1.1
#  file_picker: ^10.3.10
#  local_auth: ^3.0.0
#  flutter_secure_storage: ^10.0.0
  flutter_local_notifications: ^21.0.0
