name: easy_tasweeh
description: "A clean and simple dhikr counter designed for Muslims who want to stay consistent with their daily tasbeeh."
publish_to: 'none'

version: 1.0.2+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.41
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  dynamic_color: ^1.8.1
  app_settings: ^7.0.0
  url_launcher: ^6.3.2
  fl_chart: ^1.1.1
  file_picker: ^10.3.10
  local_auth: ^3.0.0
  flutter_secure_storage: ^10.0.0
  flutter_local_notifications: ^20.1.0
  archive: ^4.0.9
  flutter_phoenix: ^1.1.1
  flutter_animate: ^4.5.2
  workmanager: ^0.9.0+3
  permission_handler: ^12.0.1
  timezone: ^0.10.1
  http: ^1.6.0
  uuid: ^4.5.3
  vibration: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  freezed: ^3.2.3
  drift_dev: ^2.31.0
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.3

  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/bg/
    - assets/fonts/

  fonts:
    - family: GoogleSansFlex
      fonts:
        - asset: assets/fonts/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf
        